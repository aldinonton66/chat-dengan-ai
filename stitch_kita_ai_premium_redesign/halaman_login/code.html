<body class="bg-[#0a0a12] text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body-lg">

<main class="w-full max-w-md px-6 z-10 fade-in">

<p class="font-body-lg text-body-lg text-on-surface-variant">Premium AI Nexus</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-8 shadow-2xl relative overflow-hidden">
<!-- Subtle inner glow for AI presence aesthetic -->
<div class="absolute inset-0 pointer-events-none border border-primary/5 rounded-xl" style="box-shadow: inset 0 0 15px rgba(168,85,247,0.05);"></div>
<form class="space-y-6 relative z-10" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant/30 rounded-lg text-white placeholder-outline focus:outline-none glow-input transition-all font-body-sm text-body-sm" id="email" placeholder="nexus@kita.ai" required="" type="email"/>
</div>
</div>

<div class="flex items-center justify-between">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>

</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm" data-icon="lock">lock</span>
</div>

<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-sm" data-icon="visibility">visibility</span>
</button>
</div>
</div>

<script>
        // Simple theme toggle logic for demonstration
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const icon = themeToggle.querySelector('span');

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            if(html.classList.contains('dark')){
                icon.textContent = 'dark_mode';
                document.body.style.backgroundColor = '#0a0a12';
            } else {
                icon.textContent = 'light_mode';
                document.body.style.backgroundColor = '#f8f9fa'; // Lighter background for light mode
            }
        });
    </script>
