<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0f0f">
  <title>Masuk — Kita & AI</title>
  <meta name="description" content="Masuk ke aplikasi chat Kita & AI.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts (preconnect) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark">

  <!-- =========================================================
       LOGIN PAGE — Halaman terpisah sebelum masuk aplikasi
       ========================================================= -->
  <div class="login-page">
    <!-- Decorative Background Orbs (Stitch) -->
    <div class="login-bg-orbs">
      <div class="login-orb" style="top:-10%;left:-10%;width:40%;height:40%;background:radial-gradient(circle,rgba(99,102,241,0.15),transparent 70%);"></div>
      <div class="login-orb" style="bottom:-10%;right:-10%;width:40%;height:40%;background:radial-gradient(circle,rgba(168,85,247,0.10),transparent 70%);"></div>
    </div>

    <!-- Background particles -->
    <div class="login-bg-particles">
      <span class="login-particle" style="--x:10%;--y:20%;--s:1;--d:6s;"></span>
      <span class="login-particle" style="--x:85%;--y:15%;--s:0.7;--d:8s;"></span>
      <span class="login-particle" style="--x:20%;--y:80%;--s:1.3;--d:7s;"></span>
      <span class="login-particle" style="--x:70%;--y:75%;--s:0.5;--d:9s;"></span>
      <span class="login-particle" style="--x:50%;--y:10%;--s:0.8;--d:5s;"></span>
      <span class="login-particle" style="--x:90%;--y:50%;--s:1.1;--d:10s;"></span>
    </div>

    <div class="login-card">
      <!-- Logo app -->
      <div class="login-logo-ring">
        <span class="login-logo-emoji">💬</span>
      </div>

      <div class="login-header">
        <h2>Kita &amp; AI</h2>
        <p>Chat bersama AI &amp; pasangan</p>
      </div>

      <form id="login-form" class="login-form" autocomplete="off">
        <div class="login-field">
          <div class="login-input-wrap">
            <span class="login-input-icon">📧</span>
            <input type="email" id="login-email" class="login-input" placeholder="Email" required autofocus>
          </div>
        </div>
        <div class="login-field">
          <div class="login-input-wrap">
            <span class="login-input-icon">🔒</span>
            <input type="password" id="login-password" class="login-input" placeholder="Password" required>
            <button type="button" id="login-toggle-pass" class="login-toggle-pass" tabindex="-1">👁️</button>
          </div>
        </div>
        <div id="login-error" class="login-error" style="display:none;"></div>
        <button type="submit" id="btn-login" class="btn-login">
          <span>Masuk</span>
          <span class="btn-login-arrow">→</span>
        </button>
      </form>

      <p style="text-align:center;margin-top:16px;font-size:0.78rem;color:var(--text-muted);">
        Belum punya akun? Minta admin buatkan.
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
  (function () {
    "use strict";

    // ======================================================
    // Init Supabase client — URL & Anon Key dari config.js
    // ======================================================
    if (!APP_CONFIG.supabaseUrl || APP_CONFIG.supabaseUrl === "YOUR_SUPABASE_URL") {
      document.getElementById("login-error").textContent =
        "Konfigurasi Supabase belum diisi. Buka js/config.js dan isi supabaseUrl & supabaseAnonKey.";
      document.getElementById("login-error").style.display = "block";
      return;
    }

    var supabase = window.supabase.createClient(
      APP_CONFIG.supabaseUrl,
      APP_CONFIG.supabaseAnonKey
    );

    var form      = document.getElementById("login-form");
    var email     = document.getElementById("login-email");
    var password  = document.getElementById("login-password");
    var errorEl   = document.getElementById("login-error");
    var btnLogin  = document.getElementById("btn-login");
    var togglePass = document.getElementById("login-toggle-pass");

    // ======================================================
    // Kalau SUDAH login, auto-redirect ke index.html
    // ======================================================
    (async function checkSession() {
      var { data: { session } } = await supabase.auth.getSession();
      if (session) {
        location.replace("index.html");
      }
    })();

    // ======================================================
    // Toggle show/hide password
    // ======================================================
    if (togglePass && password) {
      togglePass.addEventListener("click", function () {
        var isPass = (password.type === "password");
        password.type = isPass ? "text" : "password";
        togglePass.textContent = isPass ? "🙈" : "👁️";
      });
    }

    // ======================================================
    // Submit login via Supabase Auth
    // ======================================================
    if (form) {
      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        var emailVal = (email.value || "").trim();
        var passVal  = password.value || "";

        if (!emailVal || !passVal) {
          errorEl.textContent = "Email dan password harus diisi.";
          errorEl.style.display = "block";
          return;
        }

        btnLogin.disabled = true;
        btnLogin.innerHTML = "<span>Mengecek...</span>";
        errorEl.style.display = "none";

        var { data, error } = await supabase.auth.signInWithPassword({
          email: emailVal,
          password: passVal,
        });

        if (error) {
          // Tampilkan pesan error yang user-friendly
          if (error.message.includes("Invalid login")) {
            errorEl.textContent = "Email atau password salah.";
          } else if (error.message.includes("Email not confirmed")) {
            errorEl.textContent = "Email belum dikonfirmasi. Cek inbox kamu.";
          } else {
            errorEl.textContent = error.message;
          }
          errorEl.style.display = "block";
          password.value = "";
        } else {
          // Sukses → redirect ke aplikasi utama
          location.replace("index.html");
        }

        btnLogin.disabled = false;
        btnLogin.innerHTML = '<span>Masuk</span><span class="btn-login-arrow">→</span>';
      });
    }
  })();
  </script>
</body>
</html>
